name: Coverage

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    # Only run if Tests workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          else
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Verify Tests workflow completed successfully
        uses: actions/github-script@v7
        id: verify-tests
        with:
          script: |
            const workflowRunId = '${{ github.event.workflow_run.id }}';
            const sha = '${{ steps.sha.outputs.sha }}';
            
            // Get the specific workflow run that triggered this
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: workflowRunId,
            });
            
            // Verify it's for the correct commit and completed successfully
            if (workflowRun.data.head_sha !== sha) {
              core.setFailed(`Tests workflow run ${workflowRunId} is for commit ${workflowRun.data.head_sha}, but we need ${sha}`);
              return false;
            }
            
            if (workflowRun.data.conclusion !== 'success') {
              core.setFailed(`Tests workflow run ${workflowRunId} did not complete successfully: ${workflowRun.data.conclusion}`);
              return false;
            }
            
            core.info(`Tests workflow ${workflowRunId} completed successfully for commit ${sha}`);
            return true;

      - name: Wait for test artifacts to be available
        uses: actions/github-script@v7
        id: wait-artifacts
        with:
          script: |
            const sha = '${{ steps.sha.outputs.sha }}';
            const maxAttempts = 30; // 2.5 minutes max wait
            const delayMs = 5000; // 5 seconds between attempts
            
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              
              const coverageArtifact = artifacts.data.artifacts.find(
                a => a.name === `coverage-${sha}`
              );
              const markerArtifact = artifacts.data.artifacts.find(
                a => a.name === `test-marker-${sha}`
              );
              
              if (coverageArtifact && markerArtifact) {
                core.info(`Both artifacts found after ${attempt + 1} attempts`);
                core.setOutput('found', 'true');
                return { found: true, attempts: attempt + 1 };
              }
              
              if (attempt < maxAttempts - 1) {
                core.info(`Waiting for artifacts... (attempt ${attempt + 1}/${maxAttempts})`);
                await new Promise(resolve => setTimeout(resolve, delayMs));
              }
            }
            
            core.setFailed('Timeout waiting for test artifacts to be available');
            return { found: false };

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ steps.sha.outputs.sha }}
          path: coverage/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download coverage data (if exists)
        if: steps.check-artifacts.outputs.result == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ steps.sha.outputs.sha }}
          path: coverage/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          if-no-artifacts-found: ignore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Generate coverage reports
        run: |
          # Coverage data should now exist in coverage/ directory
          # Generate any additional reports if needed
          echo "Coverage reports generated"

      - name: Setup coverage branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b coverage-reports 2>/dev/null || git checkout coverage-reports
          git pull origin coverage-reports 2>/dev/null || true

      - name: Commit coverage reports and badges
        run: |
          # Copy coverage reports to a directory in the branch
          mkdir -p coverage-reports/${{ steps.sha.outputs.sha }}
          cp -r coverage/* coverage-reports/${{ steps.sha.outputs.sha }}/ || true
          
          # Generate badges (using a badge generation tool or static badges)
          # For now, we'll create a simple coverage summary
          echo "# Coverage Report for ${{ steps.sha.outputs.sha }}" > coverage-reports/${{ steps.sha.outputs.sha }}/README.md
          echo "Generated: $(date)" >> coverage-reports/${{ steps.sha.outputs.sha }}/README.md
          
          git add coverage-reports/
          git commit -m "Add coverage report for ${{ steps.sha.outputs.sha }}" || exit 0
          git push origin coverage-reports

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json,./coverage/coverage-final.lcov
          flags: unittests,e2e
          name: codecov-umbrella
          fail_ci_if_error: false
