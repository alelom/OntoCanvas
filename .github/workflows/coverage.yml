name: Coverage

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    # Only run if triggered by workflow_run and Tests completed successfully, or if triggered by push
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check for test artifacts
        id: check-artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const sha = '${{ steps.sha.outputs.sha }}';
            const coverageArtifact = artifacts.data.artifacts.find(
              a => a.name === `coverage-${sha}`
            );
            const markerArtifact = artifacts.data.artifacts.find(
              a => a.name === `test-marker-${sha}`
            );
            const found = !!(coverageArtifact && markerArtifact);
            core.setOutput('found', found);
            return found;
        continue-on-error: true

      - name: Download coverage data (if exists)
        if: steps.check-artifacts.outputs.result == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ steps.sha.outputs.sha }}
          path: coverage/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check-artifacts.outputs.result != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run tests with coverage (if artifacts not found)
        if: steps.check-artifacts.outputs.result != 'true'
        run: |
          npm test -- --coverage
          npm run test:e2e -- --coverage

      - name: Generate coverage reports
        run: |
          # Coverage data should now exist in coverage/ directory
          # Generate any additional reports if needed
          echo "Coverage reports generated"

      - name: Setup coverage branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b coverage-reports 2>/dev/null || git checkout coverage-reports
          git pull origin coverage-reports 2>/dev/null || true

      - name: Commit coverage reports and badges
        run: |
          # Copy coverage reports to a directory in the branch
          mkdir -p coverage-reports/${{ steps.sha.outputs.sha }}
          cp -r coverage/* coverage-reports/${{ steps.sha.outputs.sha }}/ || true
          
          # Generate badges (using a badge generation tool or static badges)
          # For now, we'll create a simple coverage summary
          echo "# Coverage Report for ${{ steps.sha.outputs.sha }}" > coverage-reports/${{ steps.sha.outputs.sha }}/README.md
          echo "Generated: $(date)" >> coverage-reports/${{ steps.sha.outputs.sha }}/README.md
          
          git add coverage-reports/
          git commit -m "Add coverage report for ${{ steps.sha.outputs.sha }}" || exit 0
          git push origin coverage-reports

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json,./coverage/coverage-final.lcov
          flags: unittests,e2e
          name: codecov-umbrella
          fail_ci_if_error: false
