name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      unit: ${{ steps.filter.outputs.unit }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            unit:
              - 'src/**'
              - 'tests/unit/**'
              - 'vitest.config.ts'
              - 'tests/unitSetup.ts'
              - 'package.json'
              - 'package-lock.json'
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'tests/fixtures/**'
              - 'vitest.e2e.config.ts'
              - 'tests/e2e/globalSetup.ts'
              - 'tests/e2e/globalTeardown.ts'
              - 'package.json'
              - 'package-lock.json'

  unit-tests:
    name: Unit Tests
    needs: [changes]
    if: needs.changes.outputs.unit == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Upload unit test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ steps.sha.outputs.sha }}
          path: coverage/
          retention-days: 90

  e2e-tests:
    name: E2E Tests
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests with coverage
        run: npm run test:e2e -- --coverage
        env:
          EDITOR_E2E_URL: http://localhost:5173/

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Upload E2E test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-${{ steps.sha.outputs.sha }}
          path: coverage/
          retention-days: 90
