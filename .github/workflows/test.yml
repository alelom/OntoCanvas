name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Run E2E tests with coverage
        run: npm run test:e2e -- --coverage

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ steps.sha.outputs.sha }}
          path: coverage/
          retention-days: 90

      - name: Create test completion marker
        run: echo "${{ steps.sha.outputs.sha }}" > test-completed-${{ steps.sha.outputs.sha }}.txt

      - name: Upload test completion marker
        uses: actions/upload-artifact@v4
        with:
          name: test-marker-${{ steps.sha.outputs.sha }}
          path: test-completed-${{ steps.sha.outputs.sha }}.txt
          retention-days: 90
